<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Changer</title>

    <style>
        /* 👇 Body center */
        body{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: black;
        }

        /* 👇 Heading style */
        h1{
            text-align: center;
            color: white;
            border: 2px solid white;
            border-radius: 10px;
            padding: 10px 20px;
            text-shadow: 2px 2px 5px black;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            margin-bottom: 20px;
            background: rgba(255,255,255,0.1);
        }

        /* 👇 Button style */
        button{
            display: flex;
            align-items: center;
            justify-content: center;
            height: 50px;
            width: 100px;
            padding: 10px;
            margin: 10px;
            color: white;
            background-color: rgb(144, 56, 56);

            border: 2px solid #fff;              
            border-radius: 10px;
            text-shadow: 1px 1px 3px black;    
            box-shadow: 0 4px 10px rgba(26, 77, 27, 0.4);
            
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover{
            background-color: rgb(149, 78, 208);
            box-shadow: 0 6px 15px rgba(0,0,0,0.6);
            transform: scale(1.05);
        }
    </style>
</head>

<body>

    <h1>Change the Color</h1>

    <button id="start">Start</button>
    <button id="stop">Stop</button>

    <script src="33-project_setInterval.js"></script>
</body>
</html>
